services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - jekyll
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "4000"
      - --watch
      - --force_polling
      - --livereload
      - --livereload-port
      - "35729"
      - --config
      - _config.yml,_config.local.yml
    environment:
      JEKYLL_ENV: development
      TZ: Asia/Shanghai
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - jekyll-cache:/srv/jekyll/.jekyll-cache

volumes:
  jekyll-cache:
