---
layout: default
---

<article class="page-block">
  <header class="page-header">
    <p class="page-kicker">Page</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
