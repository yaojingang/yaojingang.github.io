<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != '首页' %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {%- feed_meta -%}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/archive/' | relative_url }}">归档</a>
        <a href="{{ '/categories/' | relative_url }}">分类</a>
        <a href="{{ '/tags/' | relative_url }}">标签</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
      </nav>
    </div>
  </header>

  <main class="site-main container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>{{ site.title }} · 以 Jekyll 和 GitHub Pages 构建</p>
      <a href="https://github.com/{{ site.author.github }}">GitHub</a>
    </div>
  </footer>
</body>
</html>
