<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yao Jingang</title>
  <meta name="description" content="Yao Jingang 的个人博客">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --card: rgba(255, 255, 255, 0.78);
      --text: #1f1d1a;
      --muted: #5f5a53;
      --line: rgba(31, 29, 26, 0.1);
      --accent: #b4542a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(180, 84, 42, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(31, 29, 26, 0.08), transparent 35%),
        linear-gradient(135deg, #efe4d2, var(--bg));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 56px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(31, 29, 26, 0.12);
    }

    .eyebrow {
      margin: 0 0 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 72px);
      line-height: 0.95;
    }

    p {
      margin: 20px 0 0;
      font-size: 18px;
      line-height: 1.7;
      color: var(--muted);
    }

    .note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">GitHub Pages</p>
    <h1>Yao Jingang</h1>
    <p>个人博客站点已创建，后续可以继续接入 Jekyll、Hexo、Hugo，或者直接改成自定义静态博客。</p>
    <p class="note">Repository: yaojingang/yaojingang.github.io</p>
  </main>
</body>
</html>
